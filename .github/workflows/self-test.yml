name: Self Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML
        run: |
          python3 -c "
          import yaml, sys
          with open('.github/workflows/bun-quality.yml') as f:
              try:
                  yaml.safe_load(f)
                  print('✅ bun-quality.yml is valid YAML')
              except yaml.YAMLError as e:
                  print(f'❌ Invalid YAML: {e}')
                  sys.exit(1)
          "
      - name: Check workflow structure
        run: |
          python3 -c "
          import yaml, sys
          with open('.github/workflows/bun-quality.yml') as f:
              wf = yaml.safe_load(f)
          # PyYAML parses YAML 'on:' key as Python boolean True
          assert True in wf or 'on' in wf, 'Missing on: trigger'
          on_key = wf.get(True) or wf.get('on')
          assert 'workflow_call' in on_key, 'Missing workflow_call trigger'
          assert 'jobs' in wf, 'Missing jobs'
          inputs = on_key['workflow_call'].get('inputs', {})
          for required in ('ignore-scripts', 'extra-install-dirs'):
              assert required in inputs, f'Missing input: {required}'
          assert inputs['ignore-scripts']['type'] == 'boolean'
          assert inputs['ignore-scripts']['default'] is False
          assert inputs['extra-install-dirs']['type'] == 'string'
          assert inputs['extra-install-dirs']['default'] == ''
          print('✅ Workflow structure valid')
          print(f'  Triggers: {list(on_key.keys())}')
          print(f'  Jobs: {list(wf[\"jobs\"].keys())}')
          print(f'  Inputs: {len(inputs)}')
          "

  # Behavior coverage for the v2026.2 hardening inputs.
  #
  # The fixture under .github/fixtures/self-test/ pulls a local
  # `self-test-marker` package whose postinstall writes a sentinel file
  # at $MARKER_FILE. Running `bun install --ignore-scripts` against the
  # fixture must NOT create that file; the same recipe without the flag
  # MUST create it. That gives us a direct proof that the recipe used by
  # bun-quality.yml actually suppresses lifecycle scripts.
  hardening:
    name: "Hardening: ignore-scripts + extra-install-dirs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .github/fixtures/self-test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Export marker path
        run: echo "MARKER_FILE=$RUNNER_TEMP/self-test-marker" >> "$GITHUB_ENV"

      - name: Reset marker
        run: rm -f "$MARKER_FILE"

      - name: Negative control — install without --ignore-scripts
        run: bun install --frozen-lockfile

      - name: Assert postinstall ran in the negative control
        shell: bash
        run: |
          if [ ! -f "$MARKER_FILE" ]; then
            echo "❌ negative control failed: marker missing, fixture is broken"
            exit 1
          fi
          echo "✅ negative control: postinstall ran as expected"

      - name: Reset fixture for the hardened run
        shell: bash
        run: |
          rm -rf node_modules worker/node_modules
          rm -f "$MARKER_FILE"

      - name: Install fixture with --ignore-scripts (mirrors bun-quality.yml)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install extra dirs (mirrors bun-quality.yml extra-install-dirs loop)
        shell: bash
        run: |
          IFS=',' read -ra DIRS <<< "worker"
          for d in "${DIRS[@]}"; do
            d_trim="$(echo "$d" | xargs)"
            echo "::group::bun install in $d_trim"
            (cd "$d_trim" && bun install --frozen-lockfile --ignore-scripts)
            echo "::endgroup::"
          done

      - name: Assert --ignore-scripts skipped both installs
        shell: bash
        run: |
          if [ -f "$MARKER_FILE" ]; then
            echo "❌ marker exists — postinstall ran despite --ignore-scripts"
            exit 1
          fi
          echo "✅ --ignore-scripts suppressed lifecycle scripts in main + worker"

  # Behavior coverage for the v2026.3 trusted-native-deps input.
  #
  # The fixture pulls TWO marker packages:
  #   - self-test-marker         (in trustedDependencies)
  #   - self-test-native-marker  (NOT in trustedDependencies — simulates a
  #                               native dep whose postinstall is gated)
  #
  # After `bun install --ignore-scripts`, BOTH postinstalls must be blocked.
  # Running `bun pm trust self-test-native-marker` then mirrors the recipe
  # bun-quality.yml emits when trusted-native-deps lists that package: only
  # that one postinstall re-runs, the other stays blocked. That gives a
  # direct positive+negative proof for the v2026.3 behavior.
  trusted-native-deps:
    name: "Hardening: trusted-native-deps re-runs whitelisted postinstall"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .github/fixtures/self-test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Export marker paths
        run: |
          echo "MARKER_FILE=$RUNNER_TEMP/self-test-marker" >> "$GITHUB_ENV"
          echo "NATIVE_MARKER_FILE=$RUNNER_TEMP/self-test-native-marker" >> "$GITHUB_ENV"

      - name: Reset fixture and markers
        shell: bash
        run: |
          rm -rf node_modules worker/node_modules
          rm -f "$MARKER_FILE" "$NATIVE_MARKER_FILE"

      - name: Install fixture with --ignore-scripts (mirrors bun-quality.yml)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Negative check — neither postinstall ran after --ignore-scripts
        shell: bash
        run: |
          if [ -f "$MARKER_FILE" ] || [ -f "$NATIVE_MARKER_FILE" ]; then
            echo "❌ a marker exists after --ignore-scripts; fixture or flag broken"
            ls -la "$MARKER_FILE" "$NATIVE_MARKER_FILE" 2>&1 || true
            exit 1
          fi
          echo "✅ --ignore-scripts blocked both postinstalls as expected"

      - name: Trust native deps (mirrors bun-quality.yml trusted-native-deps loop)
        shell: bash
        run: |
          IFS=',' read -ra PKGS <<< "self-test-native-marker"
          ARGS=()
          for p in "${PKGS[@]}"; do
            p_trim="$(echo "$p" | xargs)"
            [ -n "$p_trim" ] && ARGS+=("$p_trim")
          done
          if [ ${#ARGS[@]} -gt 0 ]; then
            echo "::group::bun pm trust ${ARGS[*]}"
            bun pm trust "${ARGS[@]}"
            echo "::endgroup::"
          fi

      - name: Assert trust re-ran ONLY the whitelisted postinstall
        shell: bash
        run: |
          if [ ! -f "$NATIVE_MARKER_FILE" ]; then
            echo "❌ native marker missing — bun pm trust did not re-run the whitelisted postinstall"
            exit 1
          fi
          if [ -f "$MARKER_FILE" ]; then
            echo "❌ non-whitelisted marker exists — trust step over-ran scripts (Shai-Hulud defense broken)"
            exit 1
          fi
          echo "✅ bun pm trust re-ran only self-test-native-marker; self-test-marker stayed blocked"
