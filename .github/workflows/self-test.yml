name: Self Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML
        run: |
          python3 -c "
          import yaml, sys
          with open('.github/workflows/bun-quality.yml') as f:
              try:
                  yaml.safe_load(f)
                  print('✅ bun-quality.yml is valid YAML')
              except yaml.YAMLError as e:
                  print(f'❌ Invalid YAML: {e}')
                  sys.exit(1)
          "
      - name: Check workflow structure
        run: |
          python3 -c "
          import yaml, sys
          with open('.github/workflows/bun-quality.yml') as f:
              wf = yaml.safe_load(f)
          # PyYAML parses YAML 'on:' key as Python boolean True
          assert True in wf or 'on' in wf, 'Missing on: trigger'
          on_key = wf.get(True) or wf.get('on')
          assert 'workflow_call' in on_key, 'Missing workflow_call trigger'
          assert 'jobs' in wf, 'Missing jobs'
          inputs = on_key['workflow_call'].get('inputs', {})
          for required in ('ignore-scripts', 'extra-install-dirs'):
              assert required in inputs, f'Missing input: {required}'
          assert inputs['ignore-scripts']['type'] == 'boolean'
          assert inputs['ignore-scripts']['default'] is False
          assert inputs['extra-install-dirs']['type'] == 'string'
          assert inputs['extra-install-dirs']['default'] == ''
          print('✅ Workflow structure valid')
          print(f'  Triggers: {list(on_key.keys())}')
          print(f'  Jobs: {list(wf[\"jobs\"].keys())}')
          print(f'  Inputs: {len(inputs)}')
          "

  # Behavior coverage for the v2026.2 hardening inputs.
  #
  # The fixture under .github/fixtures/self-test/ pulls a local
  # `self-test-native-marker` package (whitelisted via trustedDependencies)
  # whose postinstall writes a sentinel file at $NATIVE_MARKER_FILE.
  # Running `bun install --ignore-scripts` against the fixture must NOT
  # create that file; the same recipe without the flag MUST create it.
  # That gives us a direct proof that the recipe used by bun-quality.yml
  # actually suppresses lifecycle scripts.
  hardening:
    name: "Hardening: ignore-scripts + extra-install-dirs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .github/fixtures/self-test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Export marker paths
        run: |
          echo "MARKER_FILE=$RUNNER_TEMP/self-test-marker" >> "$GITHUB_ENV"
          echo "NATIVE_MARKER_FILE=$RUNNER_TEMP/self-test-native-marker" >> "$GITHUB_ENV"

      - name: Reset markers
        run: rm -f "$MARKER_FILE" "$NATIVE_MARKER_FILE"

      - name: Negative control — install without --ignore-scripts
        run: bun install --frozen-lockfile

      - name: Assert whitelisted postinstall ran in the negative control
        shell: bash
        run: |
          if [ ! -f "$NATIVE_MARKER_FILE" ]; then
            echo "❌ negative control failed: whitelisted marker missing, fixture is broken"
            exit 1
          fi
          echo "✅ negative control: postinstall ran for whitelisted dep as expected"

      - name: Reset fixture for the hardened run
        shell: bash
        run: |
          rm -rf node_modules worker/node_modules
          rm -f "$MARKER_FILE" "$NATIVE_MARKER_FILE"

      - name: Install fixture with --ignore-scripts (mirrors bun-quality.yml)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install extra dirs (mirrors bun-quality.yml extra-install-dirs loop)
        shell: bash
        run: |
          IFS=',' read -ra DIRS <<< "worker"
          for d in "${DIRS[@]}"; do
            d_trim="$(echo "$d" | xargs)"
            echo "::group::bun install in $d_trim"
            (cd "$d_trim" && bun install --frozen-lockfile --ignore-scripts)
            echo "::endgroup::"
          done

      - name: Assert --ignore-scripts skipped both installs
        shell: bash
        run: |
          if [ -f "$MARKER_FILE" ] || [ -f "$NATIVE_MARKER_FILE" ]; then
            echo "❌ a marker exists — postinstall ran despite --ignore-scripts"
            ls -la "$MARKER_FILE" "$NATIVE_MARKER_FILE" 2>&1 || true
            exit 1
          fi
          echo "✅ --ignore-scripts suppressed lifecycle scripts in main + worker"

  # Behavior coverage for the v2026.4 trusted-native-deps model.
  #
  # When the caller workflow sets `trusted-native-deps: "..."`, bun-quality.yml
  # does NOT forward --ignore-scripts. Instead bun uses its own
  # `package.json#trustedDependencies` whitelist to gate which postinstall
  # scripts run. This job exercises that recipe:
  #
  #   - self-test-native-marker  (IN trustedDependencies — must run)
  #   - self-test-marker         (NOT in trustedDependencies — must stay blocked)
  #
  # That is a direct positive+negative proof for the v2026.4 behavior:
  # native bindings load, every other postinstall stays gated.
  trusted-native-deps:
    name: "Hardening: trustedDependencies whitelist runs only listed postinstall"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .github/fixtures/self-test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Export marker paths
        run: |
          echo "MARKER_FILE=$RUNNER_TEMP/self-test-marker" >> "$GITHUB_ENV"
          echo "NATIVE_MARKER_FILE=$RUNNER_TEMP/self-test-native-marker" >> "$GITHUB_ENV"

      - name: Reset fixture and markers
        shell: bash
        run: |
          rm -rf node_modules worker/node_modules
          rm -f "$MARKER_FILE" "$NATIVE_MARKER_FILE"

      - name: Install fixture (no --ignore-scripts, mirrors v2026.4 bun-quality.yml when trusted-native-deps is set)
        run: bun install --frozen-lockfile

      - name: Assert ONLY the whitelisted postinstall ran
        shell: bash
        run: |
          if [ ! -f "$NATIVE_MARKER_FILE" ]; then
            echo "❌ native marker missing — trustedDependencies whitelist did NOT run self-test-native-marker's postinstall"
            exit 1
          fi
          if [ -f "$MARKER_FILE" ]; then
            echo "❌ non-whitelisted marker exists — bun ran self-test-marker's postinstall despite it being absent from trustedDependencies (Shai-Hulud defense broken)"
            exit 1
          fi
          echo "✅ trustedDependencies whitelist ran ONLY self-test-native-marker; self-test-marker stayed blocked"

      - name: Sanity check — require('self-test-native-marker') loads (mirrors native binding)
        shell: bash
        run: |
          # The package's index.js throws if its postinstall flag is missing
          # — the same failure mode `require('better-sqlite3')` would exhibit
          # when its prebuilt binding never got fetched. Asserts the v2026.4
          # path produces a *working* dep, not just a marker file.
          node -e "const m = require('self-test-native-marker'); if (!m.loaded) { console.error('loaded flag missing'); process.exit(1); }"
          echo "✅ require('self-test-native-marker') succeeds (binding usable)"
